# service.type defaults to LoadBalancer in this chart version
# ingressClass.enabled and isDefaultClass both default to true
service:
  annotations:
    metallb.io/loadBalancerIPs: "${load_balancer_ip}"
  spec:
    externalTrafficPolicy: Local

# Run one Traefik pod per node so MetalLB (BGP mode) advertises the VIP from
# all nodes simultaneously, enabling ECMP load distribution across the cluster.
deployment:
  kind: DaemonSet

# Dashboard IngressRoute is managed as a kubernetes_manifest in traefik.tf
# to support the two-route pattern required for Authentik forward auth
ingressRoute:
  dashboard:
    enabled: false

# Allow IngressRoutes to reference services in other namespaces
# Required for Longhorn (longhorn-system), ArgoCD (argocd), and future cross-namespace routes
providers:
  kubernetesCRD:
    allowCrossNamespace: true

# Redirect all HTTP traffic to HTTPS
ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
