global:
  tlsDisable: ${tls_enabled ? false : true}

server:
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      config: |
        ui = true
        listener "tcp" {
%{ if tls_enabled ~}
          tls_disable     = 0
          tls_cert_file   = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file    = "/vault/userconfig/vault-tls/tls.key"
%{ else ~}
          tls_disable     = 1
%{ endif ~}
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/vault/data"
          retry_join {
%{ if tls_enabled ~}
            leader_api_addr = "https://vault-0.vault-internal:8200"
%{ else ~}
            leader_api_addr = "http://vault-0.vault-internal:8200"
%{ endif ~}
          }
          retry_join {
%{ if tls_enabled ~}
            leader_api_addr = "https://vault-1.vault-internal:8200"
%{ else ~}
            leader_api_addr = "http://vault-1.vault-internal:8200"
%{ endif ~}
          }
          retry_join {
%{ if tls_enabled ~}
            leader_api_addr = "https://vault-2.vault-internal:8200"
%{ else ~}
            leader_api_addr = "http://vault-2.vault-internal:8200"
%{ endif ~}
          }
        }
%{ if tls_enabled ~}

  volumes:
    - name: vault-tls
      secret:
        secretName: vault-tls
  volumeMounts:
    - mountPath: /vault/userconfig/vault-tls
      name: vault-tls
      readOnly: true
%{ endif ~}

  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: longhorn

injector:
  enabled: false  # Using ESO for secret sync, not the agent injector

ui:
  enabled: true
