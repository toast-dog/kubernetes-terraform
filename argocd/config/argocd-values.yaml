global:
  domain: ${argocd_hostname}
  env:
    - name: TZ
      value: America/Los_Angeles

configs:
  params:
    # Traefik handles TLS termination; ArgoCD server runs in HTTP mode
    server.insecure: true
  cm:
    admin.enabled: "false"
    oidc.config: |
      name: Authentik
      issuer: https://${authentik_hostname}/application/o/argocd/
      clientID: argocd
      clientSecret: $argocd-oidc:clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
  rbac:
    policy.csv: |
      g, home_admins, role:admin
    policy.default: role:readonly

redis-ha:
  enabled: true

controller:
  replicas: 2

server:
  deploymentAnnotations:
    secret.reloader.stakater.com/reload: "argocd-oidc,argocd-secret"

repoServer:
  replicas: 2
  livenessProbe:
    timeoutSeconds: 10
